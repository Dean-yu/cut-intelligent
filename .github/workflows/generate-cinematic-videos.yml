name: Generate Cultivation Cinematic Videos

on:
  push:
    branches: [main]
    paths:
      - 'video_generation/generate.py'
      - 'video_generation/inputs/**'
  workflow_dispatch:

concurrency:
  group: cultivation-cinematic-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Publish run identifier
        run: |
          git config user.name 'video-generation-bot'
          git config user.email 'actions@users.noreply.github.com'
          git pull --rebase origin main
          mkdir -p generation_status
          printf 'status=running\nrun_id=%s\nstarted_at=%s\n' "$GITHUB_RUN_ID" "$(date -u +%FT%TZ)" > "generation_status/${GITHUB_RUN_ID}.txt"
          git add "generation_status/${GITHUB_RUN_ID}.txt"
          git commit -m "chore: mark cinematic video run ${GITHUB_RUN_ID} started"
          git push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install video generation client and editor
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          python -m pip install --upgrade pip
          pip install --upgrade gradio_client pillow

      - name: Generate nine AI video shots and edit three short films
        env:
          PYTHONUNBUFFERED: '1'
          GRADIO_ANALYTICS_ENABLED: 'False'
        run: |
          mkdir -p generated_videos generation_logs work
          python video_generation/generate.py

      - name: Upload generated films
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cultivation-cinematic-videos-${{ github.run_id }}
          path: |
            generated_videos/${{ github.run_id }}/*
            generation_logs/${{ github.run_id }}/*
          if-no-files-found: warn
          retention-days: 7

      - name: Commit final films and logs
        if: always()
        run: |
          git config user.name 'video-generation-bot'
          git config user.email 'actions@users.noreply.github.com'
          printf 'status=completed\nrun_id=%s\nfinished_at=%s\n' "$GITHUB_RUN_ID" "$(date -u +%FT%TZ)" > "generation_status/${GITHUB_RUN_ID}.txt"
          git add "generated_videos/${GITHUB_RUN_ID}" "generation_logs/${GITHUB_RUN_ID}" "generation_status/${GITHUB_RUN_ID}.txt" || true
          git diff --cached --quiet || git commit -m "feat: publish cinematic video run ${GITHUB_RUN_ID}"
          git pull --rebase origin main
          git push
