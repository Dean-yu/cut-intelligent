name: Generate Three Real LTX Cinematic Films

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-ltx-video.yml'
      - 'video_generation/test_ltx.py'
      - 'video_generation/inputs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ltx-films:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install video generation and editing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          python -m pip install --upgrade pip
          pip install --upgrade gradio_client pillow

      - name: Generate six temporal clips and edit three short films
        env:
          PYTHONUNBUFFERED: '1'
          GRADIO_ANALYTICS_ENABLED: 'False'
        run: python video_generation/test_ltx.py

      - name: Upload generated films and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ltx-cinematic-films-${{ github.run_id }}
          path: ltx_test/${{ github.run_id }}/*
          if-no-files-found: warn
          retention-days: 7

      - name: Publish generated outputs
        if: always()
        run: |
          git config user.name 'video-generation-bot'
          git config user.email 'actions@users.noreply.github.com'
          git pull --rebase origin main
          git add ltx_test/${GITHUB_RUN_ID} || true
          git diff --cached --quiet || git commit -m "video: publish three LTX cinematic films ${GITHUB_RUN_ID}"
          git push

